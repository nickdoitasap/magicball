<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Шар Судьбы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a6030;
    --bg-deep: #060608;
    --bg-mid: #0d0d14;
    --text: #e8dfc0;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-deep);
    font-family: 'Crimson Text', serif;
    color: var(--text);
    overflow: hidden;
    touch-action: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Stars background */
  .stars {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0% { opacity: 0; }
    100% { opacity: var(--op); }
  }

  /* Fog at bottom */
  .fog {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 160px;
    background: radial-gradient(ellipse at bottom, rgba(40,20,80,0.35) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 5vw, 26px);
    letter-spacing: 0.18em;
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 30px rgba(201,168,76,0.5), 0 0 60px rgba(201,168,76,0.2);
    animation: titleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(201,168,76,0.4), 0 0 50px rgba(201,168,76,0.15); }
    to   { text-shadow: 0 0 40px rgba(201,168,76,0.7), 0 0 80px rgba(201,168,76,0.3); }
  }

  /* ── BALL ── */
  .ball-wrap {
    position: relative;
    width: min(260px, 68vw);
    height: min(260px, 68vw);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .ball {
    width: 100%; height: 100%;
    border-radius: 50%;
    position: relative;
    transform-style: preserve-3d;
    animation: idle 6s ease-in-out infinite;
    transition: transform 0.1s ease;
    filter: drop-shadow(0 10px 40px rgba(0,0,0,0.8));
  }

  @keyframes idle {
    0%,100% { transform: rotateY(0deg) rotateX(5deg); }
    50%      { transform: rotateY(15deg) rotateX(-3deg); }
  }

  .ball.shaking {
    animation: shake 0.6s ease-in-out;
  }
  @keyframes shake {
    0%   { transform: rotateY(0) rotateX(0) translateX(0); }
    10%  { transform: rotateY(-30deg) rotateX(15deg) translateX(-8px); }
    25%  { transform: rotateY(30deg) rotateX(-20deg) translateX(10px) scale(1.05); }
    40%  { transform: rotateY(-20deg) rotateX(25deg) translateX(-6px); }
    55%  { transform: rotateY(40deg) rotateX(-10deg) translateX(8px) scale(1.03); }
    70%  { transform: rotateY(-10deg) rotateX(5deg) translateX(-4px); }
    85%  { transform: rotateY(5deg) rotateX(-2deg) translateX(2px); }
    100% { transform: rotateY(0) rotateX(5deg) translateX(0); }
  }

  /* Ball body: deep black billiard */
  .ball-sphere {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(
      circle at 35% 30%,
      #2a2a3a 0%,
      #111118 30%,
      #05050a 60%,
      #000000 100%
    );
  }

  /* Main specular highlight */
  .ball-shine {
    position: absolute;
    width: 42%; height: 32%;
    top: 11%; left: 18%;
    border-radius: 50%;
    background: radial-gradient(
      ellipse at 40% 35%,
      rgba(255,255,255,0.55) 0%,
      rgba(200,220,255,0.25) 40%,
      transparent 70%
    );
    transform: rotate(-20deg);
    filter: blur(2px);
  }

  /* Small secondary highlight */
  .ball-shine2 {
    position: absolute;
    width: 18%; height: 12%;
    top: 17%; left: 26%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.85) 0%, transparent 70%);
    filter: blur(1px);
  }

  /* Rim light (bottom right) */
  .ball-rim {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(
      circle at 72% 78%,
      rgba(60,40,120,0.35) 0%,
      transparent 55%
    );
  }

  /* The "8" circle window */
  .ball-circle {
    position: absolute;
    width: 42%; height: 42%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 40% 38%, #1a1a2e, #06060f);
    border: 1.5px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.5);
    transition: opacity 0.3s;
  }
  .ball-circle .num {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 8vw, 38px);
    font-weight: 900;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
    letter-spacing: -0.02em;
  }
  .ball-circle.hidden { opacity: 0; }

  /* Compliment overlay inside circle */
  .ball-answer {
    position: absolute;
    width: 78%; height: 78%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 40% 38%, #1c1050, #08031a);
    border: 1px solid rgba(120,80,255,0.25);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease;
    padding: 12%;
    box-shadow: inset 0 0 20px rgba(80,40,180,0.4), 0 0 20px rgba(60,20,120,0.3);
  }
  .ball-answer.visible { opacity: 1; }
  .ball-answer p {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: clamp(8px, 2.8vw, 13px);
    color: rgba(220,200,255,0.95);
    text-align: center;
    line-height: 1.4;
    letter-spacing: 0.01em;
  }

  /* Ground shadow */
  .shadow {
    width: 60%; height: 14px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
    border-radius: 50%;
    margin-top: -10px;
    animation: shadowPulse 6s ease-in-out infinite;
  }
  @keyframes shadowPulse {
    0%,100% { transform: scaleX(1); opacity: 0.6; }
    50%      { transform: scaleX(1.1); opacity: 0.4; }
  }

  /* Hint text */
  .hint {
    font-family: 'Cinzel', serif;
    font-size: clamp(10px, 3vw, 13px);
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    text-align: center;
    opacity: 0.8;
    animation: hintFade 2.5s ease-in-out infinite alternate;
  }
  @keyframes hintFade {
    from { opacity: 0.4; }
    to   { opacity: 0.9; }
  }

  /* Bottom compliment card */
  .compliment-card {
    width: 100%;
    min-height: 80px;
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 18px 22px;
    background: linear-gradient(135deg, rgba(20,15,40,0.9), rgba(10,8,20,0.95));
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    text-align: center;
  }
  .compliment-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.04), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .compliment-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .compliment-card p {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: clamp(15px, 4vw, 20px);
    color: var(--gold-light);
    line-height: 1.5;
    position: relative; z-index: 1;
  }
  .compliment-card .deco {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    display: block;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }

  /* Particle burst */
  .particle {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    animation: particleFly var(--dur) ease-out forwards;
  }
  @keyframes particleFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="fog"></div>

<div class="container">
  <div class="title">✦ ШАР СУДЬБЫ ✦</div>

  <div class="ball-wrap" id="ballWrap">
    <div class="ball" id="ball">
      <div class="ball-sphere"></div>
      <div class="ball-shine"></div>
      <div class="ball-shine2"></div>
      <div class="ball-rim"></div>
      <div class="ball-circle" id="eightCircle"><span class="num">8</span></div>
      <div class="ball-answer" id="ballAnswer"><p id="ballAnswerText"></p></div>
    </div>
  </div>

  <div class="shadow"></div>
  <div class="hint" id="hint">— СПРОСИ СУДЬБУ —</div>

  <div class="compliment-card" id="card">
    <span class="deco">✦ ПРОРОЧЕСТВО ✦</span>
    <p id="cardText"></p>
  </div>
</div>

<script>
// Telegram Web App init
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 90; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%; left:${Math.random()*100}%;
    --d:${(Math.random()*4+2).toFixed(1)}s;
    --op:${(Math.random()*0.7+0.1).toFixed(2)};
    animation-delay:${(Math.random()*5).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// ── Compliments ──
const compliments = [
  "Скоро тебя настигнет неожиданная удача",
  "Звёзды готовят тебе приятный сюрприз",
  "Кто-то думает о тебе прямо сейчас",
  "Большие перемены уже на пороге",
  "Деньги найдут путь к тебе сами",
  "Встреча, которую ты ждёшь, случится скоро",
  "Твоя мечта ближе, чем кажется",
  "Этот день принесёт тебе что-то важное",
  "Удача сегодня на твоей стороне",
  "Вселенная слышит твои желания",
  "Тебя ждёт неожиданное везение",
  "Потерянное вернётся к тебе",
  "Хорошие новости придут раньше, чем ты думаешь",
  "Чужая помощь появится в нужный момент",
  "Твоя интуиция сегодня не подведёт",
  "Долгожданное решение наконец придёт",
  "Судьба готовит тебе приятный поворот",
  "То, чего ты боишься, обернётся благом",
  "Новый путь откроется там, где ты не ждал",
  "Этой ночью звёзды работают на тебя",
];

// ── Logic ──
const ball       = document.getElementById('ball');
const eightCircle= document.getElementById('eightCircle');
const ballAnswer = document.getElementById('ballAnswer');
const ballAnswerText = document.getElementById('ballAnswerText');
const card       = document.getElementById('card');
const cardText   = document.getElementById('cardText');
const hint       = document.getElementById('hint');
const ballWrap   = document.getElementById('ballWrap');

let busy = false;
let lastIdx = -1;
let tapCount = 0;

function getRandom() {
  let idx;
  do { idx = Math.floor(Math.random() * compliments.length); }
  while (idx === lastIdx);
  lastIdx = idx;
  return compliments[idx];
}

function spawnParticles(x, y) {
  const colors = ['#c9a84c','#f0d080','#a06020','#fff0a0','#e0c060'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 18 + Math.random()*0.3;
    const dist  = 60 + Math.random() * 80;
    p.style.cssText = `
      left:${x}px; top:${y}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${(Math.cos(angle)*dist).toFixed(1)}px;
      --ty:${(Math.sin(angle)*dist).toFixed(1)}px;
      --dur:${(0.6+Math.random()*0.5).toFixed(2)}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

function activate(event) {
  if (busy) return;
  busy = true;

  // Particle burst at click/tap point
  const rect = ballWrap.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top  + rect.height/2;
  spawnParticles(cx, cy);

  tapCount++;
  const text = (tapCount % 3 === 0) ? "пошёл нахуй, хватит тыкать" : getRandom();

  // Haptic if available
  if (window.Telegram?.WebApp?.HapticFeedback) {
    Telegram.WebApp.HapticFeedback.impactOccurred('medium');
  }

  // 1. Shake ball
  ball.classList.remove('shaking');
  void ball.offsetWidth;
  ball.classList.add('shaking');

  hint.style.opacity = '0';

  // 2. After shake starts — fade out 8
  setTimeout(() => {
    eightCircle.classList.add('hidden');
    ballAnswerText.textContent = text;
    ballAnswer.classList.add('visible');
  }, 350);

  // 3. Show card
  setTimeout(() => {
    cardText.textContent = text;
    card.classList.add('visible');
  }, 700);

  // 4. After some time — restore 8 and allow next tap
  setTimeout(() => {
    ballAnswer.classList.remove('visible');
    setTimeout(() => {
      eightCircle.classList.remove('hidden');
      ball.classList.remove('shaking');
      hint.style.opacity = '';
      busy = false;
    }, 400);
  }, 3200);
}

ballWrap.addEventListener('click', activate);
ballWrap.addEventListener('touchend', (e) => { e.preventDefault(); activate(e); }, { passive: false });
</script>
</body>
</html>
